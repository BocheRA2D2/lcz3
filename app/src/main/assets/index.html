<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#000000" />
  <meta name="description" content="Pełnoekranowy dashboard dla Huawei P30 Pro" />
  <title>LCZ3 Dashboard</title>
  <link rel="stylesheet" href="style.css" />
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet" />
  <!-- Leaflet Map -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
</head>
<body class="theme-dark" id="app-body">

  <!-- ===================== MAIN DASHBOARD ===================== -->
  <div id="dashboard">

    <!-- Clock & Date Widget -->
    <div class="widget" id="widget-clock" data-id="clock">
      <div id="clock-time" class="clock-time">00:00</div>
      <div id="clock-date" class="clock-date">Piątek 27-03-2026</div>
      <div class="edit-handle">⠿</div>
    </div>

    <!-- Trip Timer Widget -->
    <div class="widget" id="widget-timer" data-id="timer">
      <div class="widget-header">
        <div class="widget-label">CZAS JAZDY</div>
        <button id="btn-trip" class="trip-btn start" onclick="toggleTrip()">
          <span class="btn-icon">▶</span>
          <span class="btn-text">START</span>
        </button>
      </div>
      <div id="trip-display" class="trip-display">00:00:00</div>
      <div class="edit-handle">⠿</div>
    </div>

    <!-- Battery Widget -->
    <div class="widget" id="widget-battery" data-id="battery">
      <div class="widget-label">BATERIA</div>
      <div class="battery-container">
        <div class="battery-shell">
          <div id="battery-fill" class="battery-fill"></div>
          <div class="battery-tip"></div>
        </div>
        <div id="battery-pct" class="battery-pct">--%</div>
      </div>
      <div id="battery-status" class="battery-status">Ładowanie...</div>
      <div class="edit-handle">⠿</div>
    </div>

    <!-- Weather Current Widget -->
    <div class="widget" id="widget-weather" data-id="weather">
      <div class="widget-label">POGODA TERAZ</div>
      <div class="weather-row">
        <span id="weather-icon" class="weather-icon">🌤</span>
        <span id="weather-temp" class="weather-temp">--°C</span>
      </div>
      <div id="weather-desc" class="weather-desc">Ładowanie...</div>
      <button id="btn-refresh" class="refresh-btn" onclick="refreshWeather()" title="Odśwież pogodę">
        <span id="refresh-icon" class="refresh-icon">↻</span>
      </button>
      <div class="edit-handle">⠿</div>
    </div>

    <!-- Weather Forecast +1h Widget -->
    <div class="widget" id="widget-forecast" data-id="forecast">
      <div class="widget-label">ZA GODZINĘ</div>
      <div class="weather-row">
        <span id="forecast-icon" class="weather-icon">🌤</span>
        <span id="forecast-temp" class="weather-temp">--°C</span>
      </div>
      <div id="forecast-desc" class="weather-desc">Ładowanie...</div>
      <div class="edit-handle">⠿</div>
    </div>

    <!-- Map Widget -->
    <div class="widget" id="widget-map" data-id="map">
      <div class="widget-label">MAPA (GPS)</div>
      <div id="map-container"></div>
      <div class="edit-handle">⠿</div>
    </div>

  </div><!-- /#dashboard -->

  <!-- ===================== SETTINGS OVERLAY ===================== -->
  <div id="settings-overlay" class="settings-overlay hidden">
    <div class="settings-panel">
      <div class="settings-header">
        <span class="settings-title">⚙ Ustawienia</span>
        <button class="settings-close" onclick="closeSettings()">✕</button>
      </div>

      <!-- Theme -->
      <div class="settings-section">
        <div class="settings-section-title">Motyw</div>
        <div class="theme-buttons">
          <button class="theme-btn" id="btn-dark" onclick="setTheme('dark')">⬛ Czarny</button>
          <button class="theme-btn" id="btn-light" onclick="setTheme('light')">⬜ Biały</button>
          <button class="theme-btn" id="btn-fancy" onclick="setTheme('fancy')">✨ Bajerancki</button>
        </div>
      </div>

      <!-- Auto Pause -->
      <div class="settings-section">
        <div class="settings-section-title">Auto-pauza</div>
        <label class="toggle-label">
          <span>Pauzuj timer gdy ekran wygasza</span>
          <input type="checkbox" id="chk-autopause" onchange="setAutoPause(this.checked)" />
          <span class="toggle-slider"></span>
        </label>
      </div>

      <!-- Orientation -->
      <div class="settings-section">
        <div class="settings-section-title">Orientacja</div>
        <div class="theme-buttons">
          <button class="theme-btn" id="btn-portrait" onclick="setOrientation('portrait')">📱 Pion</button>
          <button class="theme-btn" id="btn-landscape" onclick="setOrientation('landscape')">📺 Poziom</button>
        </div>
      </div>

      <!-- Edit Mode -->
      <div class="settings-section">
        <button class="edit-mode-btn" id="btn-edit" onclick="toggleEditMode()">✏ Tryb edycji</button>
        <button class="edit-mode-btn save" id="btn-save" onclick="saveLayout()" style="display:none">💾 Zapisz układ</button>
        <button class="edit-mode-btn reset" id="btn-reset" onclick="resetLayout()">🔄 Resetuj układ</button>
      </div>

      <!-- Fullscreen -->
      <div class="settings-section">
        <button class="edit-mode-btn" onclick="requestFullscreen()">⛶ Pełny ekran</button>
      </div>
    </div>
  </div><!-- /#settings-overlay -->

  <!-- ===================== EDIT MODE INDICATOR ===================== -->
  <div id="edit-bar" class="edit-bar hidden">
    <span>TRYB EDYCJI – przeciągaj i skaluj widgety</span>
    <button onclick="saveLayout(); toggleEditMode()">💾 Zapisz i wyjdź</button>
  </div>

  <!-- Leaflet Map -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="app.js"></script>
</body>
</html>
