plugins {
    id 'com.android.application'
}

android {
    namespace 'com.lcz3.dashboard'
    compileSdk 34

    defaultConfig {
        applicationId "com.lcz3.dashboard"
        minSdk 28
        targetSdk 34
        versionCode 3
        versionName "1.2"
    }

    buildTypes {
        debug {
            debuggable true
        }
        release {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

// No external dependencies – uses only Android SDK WebView
dependencies {}
