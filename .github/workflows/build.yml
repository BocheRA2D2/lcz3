name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:   # allow manual trigger from GitHub UI

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout source code
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Set up Java 17 (required by AGP 8.x)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Set up Gradle 8.6 (no wrapper JAR needed)
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6'

      # 4. Cache Gradle dependencies between runs
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle', 'gradle-wrapper.properties') }}
          restore-keys: gradle-

      # 5. Build debug APK
      - name: Build Debug APK
        run: gradle assembleDebug --no-daemon --stacktrace
        working-directory: ${{ github.workspace }}

      # 6. Upload APK as downloadable artifact
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LCZ3-Dashboard-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # 7. Show APK size in logs
      - name: APK info
        run: |
          echo "=== APK built ==="
          ls -lh app/build/outputs/apk/debug/
